<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 60px; color: #000; line-height: 1.7; }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 40px; }
    h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-top: 40px; margin-bottom: 20px; }
    ul { list-style-type: none; padding-left: 0; }
    li { margin-bottom: 20px; }
    .item-title { font-weight: 600; }
    .item-year { color: #888; font-size: 14px; margin-left: 5px; }
    .item-desc { display: block; color: #444; font-size: 15px; }
  </style>
</head>
<body>
  <h1>{{name}}</h1>

  <section>
    <h2>Publications</h2>
    <ul>
      {{publications}}
    </ul>
  </section>

  <section>
    <h2>Events</h2>
    <ul>
      {{events}}
    </ul>
  </section>
</body>
</html>
