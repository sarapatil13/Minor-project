<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: "Georgia", serif; line-height: 1.6; color: #1a1a1a; padding: 50px; }
    h1 { text-align: center; font-size: 28pt; margin-bottom: 5pt; text-transform: uppercase; letter-spacing: 2pt; }
    h2 { border-bottom: 1pt solid #000; padding-bottom: 3pt; margin-top: 25pt; font-variant: small-caps; font-size: 16pt; }
    .subtitle { text-align: center; font-style: italic; margin-bottom: 30pt; }
    ul { list-style-type: none; padding-left: 0; }
    li { margin-bottom: 12pt; }
    .item-header { display: flex; justify-content: space-between; font-weight: bold; }
    .date { float: right; }
  </style>
</head>
<body>
  <h1>{{name}}</h1>
  <div class="subtitle">Academic Portfolio & Research Summary</div>

  <section>
    <h2>Research & Publications</h2>
    <ul>
      {{publications}}
    </ul>
  </section>

  <section>
    <h2>Events & Academic Activity</h2>
    <ul>
      {{events}}
    </ul>
  </section>
</body>
</html>
